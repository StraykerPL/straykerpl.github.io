<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self';">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=()">
    <title>Daniel "Strayker" Nowak</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="hero__inner">
          <div class="hero__left">
            <span class="hero__eyebrow">Founder - Fullstack .NET Developer</span>
            <h1 class="hero__title">Daniel "Strayker" Nowak</h1>
            <p class="hero__lead">
              Passionate about technology and the galaxy of things around us.
            </p>
          </div>
          <div class="hero__right">
            <canvas class="hero__canvas" aria-label="Animated topics visualization">
              Topics: Software Dev, Operating Systems, Open Source, Games, .NET
            </canvas>
            <ul class="hero__topics visually-hidden" aria-hidden="false">
              <li>Software Dev</li>
              <li>Operating Systems</li>
              <li>Open Source</li>
              <li>Games</li>
              <li>.NET</li>
            </ul>
          </div>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
